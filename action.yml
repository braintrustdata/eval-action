name: "Braintrust eval"
description: "Automatically run evals on your AI project using Braintrust."
author: "braintrustdata"

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: "activity"
  color: "blue"

# Define your inputs here.
inputs:
  api_key:
    description: "Your Braintrust API key"
    required: true
  root:
    description: "Root directory from which to run evals"
    required: false
    default: "."
  paths:
    description: "A list of paths (and glob patterns) to include in the evals"
    required: false
    default: "."
  runtime:
    description:
      "Deprecated. Use 'runner' instead. The runtime to use for evals. Valid
      values: node, python."
    required: false
    default: ""
  package_manager:
    description:
      "Deprecated. Use 'runner' instead. The package manager to use for evals."
    required: false
    default: ""
  runner:
    description:
      "The eval runner binary to use (e.g. tsx, vite-node, ts-node, bun,
      python3). When omitted, bt auto-detects from file extensions. Overrides
      the deprecated 'runtime' and 'package_manager' inputs."
    required: false
    default: ""
  filter:
    description:
      "Comma-separated filter expression(s) used to select which evaluators to
      run."
    required: false
    default: ""
  bt_version:
    description:
      "Version of the bt CLI to install. Leave empty for the latest stable
      release. Pass a semver (e.g. '0.2.0') to pin a stable version. Pass a
      full release tag (e.g. 'canary-add-glob-support') to install a canary
      build. Note: bt eval is currently Unix (Linux/macOS) only."
    required: false
    default: "canary-add-glob-support"
  use_proxy:
    description:
      "Whether to use the Braintrust proxy (to cache LLM calls). Set to 'true'
      or 'false'."
    required: true
    default: "true"
  terminate_on_failure:
    description:
      "Whether to terminate the evaluation process when an error occurs. Set to
      'true' or 'false'."
    required: false
    default: "false"
  github_token:
    description: "Your GitHub token"
    required: true
    default: ${{ github.token }}
  step_key:
    description:
      "A unique key to identify this step. Do not change this unless you know
      what you're doing."
    required: true
    default: ${{ github.workflow_ref }}-${{ github.action }}

runs:
  using: node20
  main: eval/dist/index.js
